---
# playbooks/setup_cursor.yml
# Cursor MCP 配置部署（基于本仓库 roles/agent_cursor）
#
# 功能：
# 0. 递归加载 inventory/<profile>/group_vars/all 下的所有 yml/yaml 变量片段
# 1. 将共享 agent_mcps 与 cursor 覆盖项归一化为 Cursor 的 mcp.json 结构
# 2. 执行 agent_cursor role，完成 ~/.cursor/mcp.json 同步
#
# 使用方法：
#   uv run ansible-playbook -i inventory/default/inventory.yml playbooks/setup_cursor.yml
#   uv run ansible-playbook -i inventory/default/inventory.yml playbooks/setup_cursor.yml -e "target_hosts=all"
#
# 默认变量目录：
#   inventory/<profile>/group_vars/all/cursor/
#     - backup.yml
#     - settings.yml
#     - mcp_servers.yml
#
# 默认备份目录（本地连接时）：
#   <repo>/tmps/cursor-backups/<inventory_hostname>/
#     - mcp-json/

- name: Cursor MCP 配置部署
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false

  pre_tasks:
    - name: 递归加载 group_vars/all 变量文件
      include_vars:
        dir: "{{ inventory_dir }}/group_vars/all"
        extensions:
          - yml
          - yaml
        ignore_unknown_extensions: true
      tags:
        - always

    - name: 计算 Cursor 备份根目录
      set_fact:
        cursor_backup_root_effective: >-
          {{
            cursor_backup_root
            if (cursor_backup_root is defined)
            else (
              (((inventory_dir | dirname) | dirname) ~ '/tmps/cursor-backups/' ~ inventory_hostname)
              if ((ansible_connection | default('ssh')) == 'local')
              else ''
            )
          }}
      tags:
        - always

    - name: 校验 Cursor 编排输入
      assert:
        that:
          - (agent_mcps | default({})) is mapping
          - (cursor_mcp_servers | default({})) is mapping
        fail_msg: >-
          Cursor 编排输入无效：请检查 agent_mcps/servers.yml 与
          cursor/settings.yml、cursor/mcp_servers.yml 中的变量结构，
          尤其是 agent_mcps 与 cursor_mcp_servers。
      tags:
        - always

    - name: 初始化 Cursor MCP 配置
      set_fact:
        cursor_mcp_servers_effective: {}
      tags:
        - always

    - name: 校验 Cursor MCP 条目
      assert:
        that:
          - item.value is mapping
          - cursor_server_type in ['local', 'stdio', 'http', 'sse']
          - (item.value.cwd is not defined) or (item.value.cwd is string)
          - (item.value.env is not defined) or (item.value.env is mapping)
          - (item.value.headers is not defined) or (item.value.headers is mapping)
          - (item.value.disabled is not defined) or (item.value.disabled is boolean)
          - (item.value.autoApprove is not defined) or ((item.value.autoApprove is sequence) and (item.value.autoApprove is not string))
          - >-
            (
              (cursor_server_type in ['local', 'stdio'])
              and (item.value.command | default('') is string)
              and ((item.value.command | default('')) | length > 0)
              and ((item.value.args is not defined) or ((item.value.args is sequence) and (item.value.args is not string)))
            )
            or
            (
              (cursor_server_type in ['http', 'sse'])
              and (item.value.url | default('') is string)
              and ((item.value.url | default('')) | length > 0)
            )
        fail_msg: >-
          Cursor MCP 条目 {{ item.key }} 无效：
          local/stdio 需要 command（args 可选），http/sse 需要 url；
          env/headers 必须是对象，disabled 必须是布尔值，autoApprove 必须是数组。
      vars:
        cursor_server_type: "{{ item.value.type | default('stdio') | lower }}"
      loop: >-
        {{
          (
            (agent_mcps | default({}))
            | combine(cursor_mcp_servers | default({}), recursive=True)
          )
          | dict2items
        }}
      loop_control:
        label: "{{ item.key }}"
      tags:
        - always

    - name: 归一化 Cursor MCP 配置
      set_fact:
        cursor_mcp_servers_effective: >-
          {{
            cursor_mcp_servers_effective
            | combine(
                {
                  item.key: cursor_server_effective
                },
                recursive=True
              )
          }}
      vars:
        cursor_server_type: "{{ item.value.type | default('stdio') | lower }}"
        cursor_server_payload: >-
          {{
            item.value
            | dict2items
            | rejectattr('key', 'equalto', 'type')
            | items2dict
          }}
        cursor_server_effective: >-
          {{
            (
              {
                'args': item.value.args | default([]),
                'env': item.value.env | default({})
              }
              | combine(cursor_server_payload, recursive=True)
            )
            if cursor_server_type in ['local', 'stdio']
            else
            (
              {
                'headers': item.value.headers | default({})
              }
              | combine(cursor_server_payload, recursive=True)
            )
          }}
      loop: >-
        {{
          (
            (agent_mcps | default({}))
            | combine(cursor_mcp_servers | default({}), recursive=True)
          )
          | dict2items
        }}
      loop_control:
        label: "{{ item.key }}"
      tags:
        - always

  tasks:
    - name: 执行 agent_cursor 角色
      include_role:
        name: agent_cursor
      vars:
        agent_cursor_home_dir: "{{ cursor_home_dir | default(lookup('env', 'HOME') ~ '/.cursor') }}"
        agent_cursor_mcp_config_path: >-
          {{
            cursor_mcp_config_path
            | default(
                (cursor_home_dir | default(lookup('env', 'HOME') ~ '/.cursor')) ~ '/mcp.json'
              )
          }}
        agent_cursor_temp_root: "{{ cursor_temp_root | default('/tmp/agent-cursor') }}"
        agent_cursor_require_agent_cli: "{{ cursor_require_agent_cli | default(true) | bool }}"
        agent_cursor_manage_mcp_config: "{{ cursor_manage_mcp_config | default(true) | bool }}"
        agent_cursor_run_verify: "{{ cursor_run_verify | default(true) | bool }}"
        agent_cursor_confirm_mcp_config_update: "{{ cursor_confirm_mcp_config_update | default(false) | bool }}"
        agent_cursor_backup: "{{ cursor_backup | default(true) | bool }}"
        agent_cursor_backup_root: "{{ cursor_backup_root_effective }}"
        agent_cursor_mcp_config:
          mcpServers: "{{ cursor_mcp_servers_effective }}"
      tags:
        - always
