# Claude Code 相关设置
# 这些设置会被转换成 settings.json 的内容，供 Claude Code 使用
# 详细配置项说明请参考官方文档：https://code.claude.com/docs/en/settings
# 交互确认、备份目录、CLI 检查、自动安装、manage/run_verify 等运行控制默认已内置；
# 只有需要覆盖时，才在 profile 中额外声明对应顶层变量。

claude_code_settings:
  # ===== 模型配置 =====
  # 订阅模式下取 model 字段（如 opus/sonnet/haiku）；API Key 模式默认 opus
  model: "{{ model_configs[claude_code_use_model].model if (model_configs[claude_code_use_model].auth | default('')) == 'subscription' else 'opus' }}"

  # ==== 开启深度思考模式 ====
  alwaysThinkingEnabled: true
  env:
    # 认证与模型覆盖（订阅模式下这些值为空，会被 playbook 过滤掉）
    ANTHROPIC_BASE_URL: "{{ model_configs[claude_code_use_model].base_url | default('') }}"
    ANTHROPIC_API_KEY: "{{ model_configs[claude_code_use_model].api_key | default('') }}"
    ANTHROPIC_DEFAULT_OPUS_MODEL: "{{ model_configs[claude_code_use_model].opus_model | default(model_configs[claude_code_use_model].model) if (model_configs[claude_code_use_model].auth | default('')) != 'subscription' else '' }}"
    ANTHROPIC_DEFAULT_SONNET_MODEL: "{{ model_configs[claude_code_use_model].sonnet_model | default(model_configs[claude_code_use_model].model) if (model_configs[claude_code_use_model].auth | default('')) != 'subscription' else '' }}"
    ANTHROPIC_DEFAULT_HAIKU_MODEL: "{{ model_configs[claude_code_use_model].haiku_model | default(model_configs[claude_code_use_model].model) if (model_configs[claude_code_use_model].auth | default('')) != 'subscription' else '' }}"
    CLAUDE_CODE_SUBAGENT_MODEL: "{{ model_configs[claude_code_use_model].claude_code_subagent | default(model_configs[claude_code_use_model].model) if (model_configs[claude_code_use_model].auth | default('')) != 'subscription' else '' }}"
    # 推理力度（仅部分 API 支持），可选值：minimal / low / medium / high / max
    CLAUDE_CODE_EFFORT_LEVEL: "max"
    # 隐私与遥测控制
    DISABLE_TELEMETRY: "1"
    DISABLE_ERROR_REPORTING: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    # MCP 超时时间（毫秒）
    MCP_TIMEOUT: "30000"

  # ===== 输出风格与语言 =====
  outputStyle: "engineer-professional.md"
  # 首选响应语言（如 zh-CN、en、ja），比 CLAUDE.md 中的指令更底层可靠
  language: "zh-CN"

  # ===== 权限配置 =====
  permissions:
    # 默认权限模式：default / acceptEdits / plan / dontAsk / bypassPermissions / delegate
    defaultMode: "default"
    allow:
      - Bash
      - Edit
      - Glob
      - Grep
      - KillShell
      - NotebookEdit
      - Read
      - TaskCreate
      - TaskGet
      - TaskList
      - TaskOutput
      - TaskStop
      - TaskUpdate
      - TodoWrite
      - WebFetch
      # - WebSearch # 不要使用自带的联网搜索
      - Write
      - mcp__open-websearch__search
      - mcp__open-websearch__fetchLinuxDoArticle
      - mcp__open-websearch__fetchGithubReadme
      - mcp__context7__resolve-library-id
      - mcp__serena__get_current_config
    deny: []

  # ===== 会话与存储 =====
  # 聊天记录保留天数（0 = 永不清理）
  cleanupPeriodDays: 60

  # ===== Claude 插件配置（来自官方市场） =====
  enabled_plugins: []
    # - "code-review@claude-plugins-official" # 官方 Code Review 插件，提供代码审查和改进建议能力
    # - "feature-dev@claude-plugins-official" # 官方 Feature Dev 插件，提供功能开发规划和代码生成能力
