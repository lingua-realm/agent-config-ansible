# Agent 通用 MCP 服务器配置
# 这里维护 Claude Code / Codex CLI / Gemini CLI / GitHub Copilot CLI / Cursor 共用的默认 MCP 定义。
#
# 覆盖规则：
# - Claude Code 可在 group_vars/all/claude_code/mcp_servers.yml 的
#   claude_code_dot_claude_json_merge.mcpServers 下按同名服务覆盖或补充。
# - Codex 可在 group_vars/all/codex/mcp_servers.yml 的 codex_mcp_servers 下
#   按同名服务覆盖或补充。
# - Gemini CLI 可在 group_vars/all/gemini_cli/mcp_servers.yml 的 gemini_mcp_servers 下
#   按同名服务覆盖或补充。
# - GitHub Copilot CLI 可在 group_vars/all/copilot_cli/mcp_servers.yml 的
#   copilot_cli_mcp_servers 下按同名服务覆盖或补充。
# - Cursor 可在 group_vars/all/cursor/mcp_servers.yml 的 cursor_mcp_servers 下
#   按同名服务覆盖或补充。
#
# 统一结构使用显式 type 字段：
#   stdio: command + args (+ env 可选)
#   http:  url (+ headers / bearer_token_env_var 可选)

agent_mcps:
  # Context7 API 文档检索
  context7:
    type: "stdio"
    command: "npx"
    args: ["-y", "@upstash/context7-mcp"]

  # 用于自动获取网络内容，并转换成 Markdown 格式给 Agent
  mcp-server-fetch:
    type: "stdio"
    command: "uvx"
    args: ["mcp-server-fetch"]

  # 用于自动联网搜索开源仓库信息
  deepwiki:
    type: "http"
    url: "https://mcp.deepwiki.com/mcp"

  # playwright 浏览器自动化
  playwright:
    type: "stdio"
    command: "npx"
    args: ["@playwright/mcp@latest"]

  # 联网搜索
  open-websearch:
    type: "stdio"
    command: "npx"
    args: ["-y", "open-websearch@latest"]
    env:
      MODE: "stdio"
      DEFAULT_SEARCH_ENGINE: "duckduckgo"
      ALLOWED_SEARCH_ENGINES: "duckduckgo,bing,brave"

  # Figma 设计稿读取（第三方 figma-context-mcp，无官方额度限制）
  # 需要在 secrets.yml 中配置 secrets.api_keys.figma 为你的 Figma Personal Access Token
  # 获取方式: Figma → Settings → Account → Personal access tokens → Generate new token
  # figma-context-mcp:
  #  type: "stdio"
  #  command: "npx"
  #  args: ["-y", "figma-developer-mcp", "--stdio"]
  #  env:
  #    FIGMA_API_KEY: "{{ (secrets | default({})).get('api_keys', {}).get('figma', '') }}"
  #  startup_timeout_sec: 30

  # Serena 代码分析和重构
  serena:
    type: "stdio"
    command: "uvx"
    args: ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server"]
    startup_timeout_sec: 20
