# Codex CLI 相关设置
# 这些设置会被转换成 ~/.codex/config.toml 的内容，供 Codex CLI 使用
# 详细配置项说明请参考官方文档：https://developers.openai.com/codex/config-reference
# 交互确认、备份目录、CLI 检查、自动安装、manage/run_verify 等运行控制默认已内置；
# 只有需要覆盖时，才在 profile 中额外声明对应顶层变量。

codex_settings:
  # ===== 沙箱与审批 =====
  # sandbox_mode: read-only / workspace-write / danger-full-access
  sandbox_mode: "read-only"

  # approval_policy: untrusted / on-failure / on-request / never
  # approval_policy: "on-request"

  # ===== 历史记录 =====
  history:
    persistence: "save-all"

  # ===== 其他可选配置 =====
  # instructions: "总是使用中文回答"
  # preferred_auth_method: "apikey"
  # disable_response_storage: true
  # features:
  #   personality: true
  tui:
    status_line:
      - model-with-reasoning
      - context-remaining
      - current-dir
      - git-branch
      - context-used
      - context-window-size
      - total-input-tokens
      - total-output-tokens

# 额外写入 ~/.codex/.env 的环境变量；会和当前模型预设的 env 合并
codex_env: {}
