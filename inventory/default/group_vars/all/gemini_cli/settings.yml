# Gemini CLI 相关设置
# 这些设置会被转换成 ~/.gemini/settings.json 的内容，供 Gemini CLI 使用。
# 详细配置项说明请参考官方文档：https://geminicli.com/docs/cli/settings/
# 交互确认、备份目录、CLI 检查、自动安装、manage/run_verify 等运行控制默认已内置；
# 只有需要覆盖时，才在 profile 中额外声明对应顶层变量。

gemini_settings:
  general:
    preferredEditor: vim
  output:
    format: text
  ui:
    autoThemeSwitching: true
    hideWindowTitle: false
    inlineThinkingMode: "off"
    showStatusInTitle: false
    dynamicWindowTitle: true
    hideContextSummary: false

# 额外写入 ~/.gemini/.env 的环境变量；会和当前模型预设的 env 合并
gemini_env: {}
