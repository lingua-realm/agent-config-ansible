# Gemini CLI 相关设置
# 这些设置会被转换成 ~/.gemini/settings.json 的内容，供 Gemini CLI 使用。
# 详细配置项说明请参考官方文档：https://geminicli.com/docs/cli/settings/

gemini_settings:
  general:
    preferredEditor: vim
  output:
    format: text
  ui:
    autoThemeSwitching: true
    hideWindowTitle: false
    inlineThinkingMode: "off"
    showStatusInTitle: false
    dynamicWindowTitle: true
    hideContextSummary: false

# 额外写入 ~/.gemini/.env 的环境变量；会和当前模型预设的 env 合并
gemini_env: {}

# 是否在更新 settings.json 前要求人工确认（true/false）
gemini_confirm_settings_update: true

# 是否在更新 ~/.gemini/.env 前要求人工确认（通常建议关闭，避免在 diff 中暴露敏感信息）
gemini_confirm_env_update: false

# 是否要求 Gemini CLI 可用
gemini_require_cli: true

# Gemini CLI 不存在时用于自动安装的 npm 包名；设为空字符串可关闭自动安装
gemini_auto_install_npm: "@google/gemini-cli"

# 是否管理 settings.json / .env / GEMINI.md 以及执行最终验证
gemini_manage_settings: true
gemini_manage_env: true
gemini_manage_gemini_md: true
gemini_run_verify: true
