---
- name: Converge — OpenCommit CLI 自动化配置
  hosts: all
  environment:
    PATH: "{{ agent_opencommit_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_opencommit_test_root: /tmp/agent-opencommit/default
    agent_opencommit_fake_bin: "{{ agent_opencommit_test_root }}/fake-bin"
    agent_opencommit_home_dir_test: "{{ agent_opencommit_test_root }}/home"
  tasks:
    - name: 准备测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ agent_opencommit_test_root }}"
        - "{{ agent_opencommit_fake_bin }}"
        - "{{ agent_opencommit_home_dir_test }}"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 oco 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/oco"
        dest: "{{ agent_opencommit_fake_bin }}/oco"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 ~/.opencommit
      copy:
        dest: "{{ agent_opencommit_home_dir_test }}/.opencommit"
        content: |
          OCO_MODEL="legacy-model"
        mode: "0600"
      tags:
        - molecule-idempotence-notest

    - name: 执行 agent_opencommit 角色
      include_role:
        name: agent_opencommit
      vars:
        agent_opencommit_home_dir: "{{ agent_opencommit_home_dir_test }}"
        agent_opencommit_temp_root: "{{ agent_opencommit_test_root }}/tmp"
        agent_opencommit_config:
          OCO_AI_PROVIDER: openai
          OCO_API_URL: https://api.ppio.com/openai/v1
          OCO_API_KEY: test-key
          OCO_MODEL: pa/gpt-5.4
          OCO_EMOJI: true
          OCO_DESCRIPTION: false
          OCO_LANGUAGE: zh-CN
          OCO_API_CUSTOM_HEADERS:
            X-Test: "yes"

    - name: 检查 ~/.opencommit 已生成
      stat:
        path: "{{ agent_opencommit_home_dir_test }}/.opencommit"
      register: agent_opencommit_config_stat

    - name: 断言 OpenCommit CLI 关键产物存在
      assert:
        that:
          - agent_opencommit_config_stat.stat.exists
          - agent_opencommit_config_stat.stat.isreg
        fail_msg: "agent_opencommit 尚未生成 ~/.opencommit"
        success_msg: "✓ agent_opencommit 已生成关键产物"
