---
- name: OpenCommit CLI 自动化配置入口
  include_tasks: validate.yml

- name: OpenCommit 配置同步阶段
  include_tasks: sync_config.yml
  when: agent_opencommit_manage_config | bool

- name: OpenCommit 验证阶段
  include_tasks: verify.yml
  when: agent_opencommit_run_verify | bool

- name: 汇总 OpenCommit CLI 自动化配置结果
  set_fact:
    agent_opencommit_result:
      changed: "{{ agent_opencommit_config_result.changed | bool }}"
      opencommit_cli: "{{ agent_opencommit_opencommit_status }}"
      config: "{{ agent_opencommit_config_result }}"
  changed_when: false
