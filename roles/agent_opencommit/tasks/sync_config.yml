---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 2：同步 ~/.opencommit
      ========================================

- name: 通过 managed_file 管理 ~/.opencommit
  include_role:
    name: managed_file
  vars:
    managed_file_display_name: OpenCommit 配置
    managed_file_dest: "{{ agent_opencommit_config_path }}"
    managed_file_temp_path: "{{ agent_opencommit_temp_root }}/opencommit.config.rendered"
    managed_file_template_src: "{{ agent_opencommit_role_path }}/templates/config.j2"
    managed_file_mode: "0600"
    managed_file_compare_kind: plain
    managed_file_confirm: "{{ agent_opencommit_confirm_config_update }}"
    managed_file_backup: "{{ agent_opencommit_backup }}"
    managed_file_backup_dir: "{{ agent_opencommit_config_backup_dir }}"
    managed_file_backup_prefix: "{{ agent_opencommit_config_backup_prefix }}"

- name: 记录 ~/.opencommit 同步结果
  set_fact:
    agent_opencommit_config_result: "{{ managed_file_result }}"
  changed_when: false
