---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance-managed-tree-default
    image: "python:3.13-bookworm"
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: $PWD/../../roles
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible