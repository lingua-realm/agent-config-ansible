---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 1：校验 Gemini CLI 配置输入
      ========================================

- name: 校验 Gemini CLI 角色输入
  assert:
    that:
      - agent_gemini_cli_home_dir | length > 0
      - agent_gemini_cli_settings_path | length > 0
      - agent_gemini_cli_env_path | length > 0
      - agent_gemini_cli_gemini_md_path | length > 0
      - agent_gemini_cli_temp_root | length > 0
      - agent_gemini_cli_settings is mapping
      - agent_gemini_cli_env is mapping
    fail_msg: >-
      agent_gemini_cli 角色参数无效：请确保 home_dir / settings_path / env_path / gemini_md_path /
      temp_root 非空，且 settings / env 为对象结构。

- name: 归一化 Gemini CLI 配置对象
  set_fact:
    agent_gemini_cli_settings_normalized: >-
      {{
        {
          'general': {},
          'ui': {},
          'model': {},
          'modelConfigs': {},
          'mcpServers': {}
        } | combine(agent_gemini_cli_settings, recursive=True)
      }}
    agent_gemini_cli_env_normalized: "{{ agent_gemini_cli_env | default({}) }}"
  changed_when: false

- name: 校验归一化后的 Gemini CLI 配置
  assert:
    that:
      - agent_gemini_cli_settings_normalized.general is mapping
      - agent_gemini_cli_settings_normalized.model is mapping
      - agent_gemini_cli_settings_normalized.modelConfigs is mapping
      - agent_gemini_cli_settings_normalized.mcpServers is mapping
    fail_msg: >-
      agent_gemini_cli 角色参数无效：请确保 general、model、modelConfigs 与 mcpServers 为对象结构。
  when: agent_gemini_cli_manage_settings | bool

- name: 归一化 Gemini CLI 辅助变量
  set_fact:
    agent_gemini_cli_should_manage_env: >-
      {{
        (agent_gemini_cli_manage_env | bool)
        and (agent_gemini_cli_env_normalized | length > 0)
      }}
    agent_gemini_cli_should_manage_gemini_md: >-
      {{
        (agent_gemini_cli_manage_gemini_md | bool)
        and (agent_gemini_cli_gemini_md_src | length > 0)
      }}
    agent_gemini_cli_settings_result:
      changed: false
      path: "{{ agent_gemini_cli_settings_path }}"
    agent_gemini_cli_env_result:
      changed: false
      path: "{{ agent_gemini_cli_env_path }}"
    agent_gemini_cli_gemini_md_result:
      changed: false
      path: "{{ agent_gemini_cli_gemini_md_path }}"
    agent_gemini_cli_role_path: "{{ role_path }}"
    agent_gemini_cli_gemini_status: {}
  changed_when: false

- name: 确保 Gemini CLI 目录存在
  file:
    path: "{{ agent_gemini_cli_home_dir }}"
    state: directory
    mode: "0755"

- name: 确保 Gemini CLI 临时目录存在
  file:
    path: "{{ agent_gemini_cli_temp_root }}"
    state: directory
    mode: "0700"

- name: 检查外部 GEMINI.md 文件
  stat:
    path: "{{ agent_gemini_cli_gemini_md_src }}"
  register: agent_gemini_cli_gemini_md_src_stat
  delegate_to: localhost
  become: false
  when: agent_gemini_cli_gemini_md_src | length > 0

- name: 校验外部 GEMINI.md 文件
  assert:
    that:
      - agent_gemini_cli_gemini_md_src_stat.stat.exists
      - agent_gemini_cli_gemini_md_src_stat.stat.isreg
    fail_msg: "外部 GEMINI.md 文件不存在或不是普通文件：{{ agent_gemini_cli_gemini_md_src }}"
  when: agent_gemini_cli_gemini_md_src | length > 0

- name: 检查 Gemini CLI
  include_role:
    name: npm_command_bootstrap
  vars:
    npm_command_bootstrap_key: gemini
    npm_command_bootstrap_display_name: Gemini CLI
    npm_command_bootstrap_command: gemini
    npm_command_bootstrap_version_command: gemini --version
    npm_command_bootstrap_auto_install_npm: >-
      {{ agent_gemini_cli_gemini_auto_install_npm if (agent_gemini_cli_gemini_auto_install_npm | length > 0) else omit }}
    npm_command_bootstrap_required: "{{ agent_gemini_cli_require_gemini_cli | bool }}"
    npm_command_bootstrap_fail_message: "未检测到可用的 Gemini CLI，无法继续执行 Gemini CLI 配置。"
    npm_command_bootstrap_install_fail_message: "Gemini CLI 自动安装失败，请检查 npm 环境或手动安装。"
  when: agent_gemini_cli_require_gemini_cli | bool

- name: 暴露 Gemini CLI 状态
  set_fact:
    agent_gemini_cli_gemini_status: "{{ npm_command_bootstrap_results.gemini | default({}) }}"
  changed_when: false
  when:
    - agent_gemini_cli_require_gemini_cli | bool
    - npm_command_bootstrap_results is defined

- name: 显示 Gemini CLI 状态汇总
  debug:
    msg: |
      ----------------------------------------
      Gemini CLI：{{ agent_gemini_cli_gemini_status.version | default('未检查') }}
      ----------------------------------------
  when: agent_gemini_cli_require_gemini_cli | bool
