---
- name: Verify — Gemini CLI 自动化配置幂等
  hosts: all
  environment:
    PATH: "{{ agent_gemini_cli_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_gemini_cli_test_root: /tmp/agent-gemini-cli/default
    agent_gemini_cli_fake_bin: "{{ agent_gemini_cli_test_root }}/fake-bin"
    agent_gemini_cli_home_dir_test: "{{ agent_gemini_cli_test_root }}/home/.gemini"
    agent_gemini_cli_gemini_md_test: "{{ agent_gemini_cli_test_root }}/home/GEMINI.md"
  tasks:
    - name: 再次执行 agent_gemini_cli 角色
      include_role:
        name: agent_gemini_cli
      vars:
        agent_gemini_cli_home_dir: "{{ agent_gemini_cli_home_dir_test }}"
        agent_gemini_cli_gemini_md_path: "{{ agent_gemini_cli_gemini_md_test }}"
        agent_gemini_cli_temp_root: "{{ agent_gemini_cli_test_root }}/tmp"
        agent_gemini_cli_verify_schema: true
        agent_gemini_cli_settings_schemafile: "{{ playbook_dir }}/files/settings.schema.json"
        agent_gemini_cli_settings:
          general:
            preferredEditor: vim
          ui:
            theme: Default
          model:
            name: gemini-2.5-pro
          modelConfigs:
            aliases:
              quick:
                modelConfig:
                  model: gemini-2.5-flash
          mcpServers:
            context7:
              command: npx
              args:
                - -y
                - "@upstash/context7-mcp"
            deepwiki:
              httpUrl: https://mcp.deepwiki.com/mcp
        agent_gemini_cli_env:
          GEMINI_API_KEY: test-key
        agent_gemini_cli_gemini_md_src: "{{ playbook_dir }}/files/GEMINI.md"

    - name: 解析最终 settings.json
      command:
        argv:
          - python3
          - -c
          - import json, pathlib, sys; print(json.dumps(json.loads(pathlib.Path(sys.argv[1]).read_text(encoding='utf-8')), ensure_ascii=False))
          - "{{ agent_gemini_cli_home_dir_test }}/settings.json"
      register: agent_gemini_cli_settings_final
      changed_when: false

    - name: 读取最终 .env
      slurp:
        src: "{{ agent_gemini_cli_home_dir_test }}/.env"
      register: agent_gemini_cli_env_final

    - name: 检查 GEMINI.md 已同步
      stat:
        path: "{{ agent_gemini_cli_gemini_md_test }}"
      register: agent_gemini_cli_gemini_md_final

    - name: 断言 Gemini CLI 结果
      assert:
        that:
          - not (agent_gemini_cli_result.changed | bool)
          - (agent_gemini_cli_settings_final.stdout | from_json).model.name == 'gemini-2.5-pro'
          - (agent_gemini_cli_settings_final.stdout | from_json).ui.theme == 'Default'
          - (agent_gemini_cli_settings_final.stdout | from_json).mcpServers.context7.command == 'npx'
          - (agent_gemini_cli_settings_final.stdout | from_json).mcpServers.deepwiki.httpUrl == 'https://mcp.deepwiki.com/mcp'
          - >-
            'GEMINI_API_KEY="test-key"' in (agent_gemini_cli_env_final.content | b64decode)
          - agent_gemini_cli_gemini_md_final.stat.exists
        fail_msg: "agent_gemini_cli 场景验证失败"
        success_msg: "✓ agent_gemini_cli 场景通过"
