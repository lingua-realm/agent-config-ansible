---
- name: Converge — Gemini CLI 自动化配置
  hosts: all
  environment:
    PATH: "{{ agent_gemini_cli_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_gemini_cli_test_root: /tmp/agent-gemini-cli/default
    agent_gemini_cli_fake_bin: "{{ agent_gemini_cli_test_root }}/fake-bin"
    agent_gemini_cli_home_dir_test: "{{ agent_gemini_cli_test_root }}/home/.gemini"
    agent_gemini_cli_gemini_md_test: "{{ agent_gemini_cli_test_root }}/home/GEMINI.md"
  tasks:
    - name: 准备测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ agent_gemini_cli_test_root }}"
        - "{{ agent_gemini_cli_fake_bin }}"
        - "{{ agent_gemini_cli_test_root }}/home"
        - "{{ agent_gemini_cli_home_dir_test }}"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 gemini 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/gemini"
        dest: "{{ agent_gemini_cli_fake_bin }}/gemini"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 执行 agent_gemini_cli 角色
      include_role:
        name: agent_gemini_cli
      vars:
        agent_gemini_cli_home_dir: "{{ agent_gemini_cli_home_dir_test }}"
        agent_gemini_cli_gemini_md_path: "{{ agent_gemini_cli_gemini_md_test }}"
        agent_gemini_cli_temp_root: "{{ agent_gemini_cli_test_root }}/tmp"
        agent_gemini_cli_settings:
          general:
            preferredEditor: vim
          ui:
            theme: Default
          model:
            name: gemini-2.5-pro
          modelConfigs:
            aliases:
              quick:
                modelConfig:
                  model: gemini-2.5-flash
          mcpServers:
            context7:
              command: npx
              args:
                - -y
                - "@upstash/context7-mcp"
            deepwiki:
              httpUrl: https://mcp.deepwiki.com/mcp
        agent_gemini_cli_env:
          GEMINI_API_KEY: test-key
        agent_gemini_cli_gemini_md_src: "{{ playbook_dir }}/files/GEMINI.md"

    - name: 检查 settings.json 已生成
      stat:
        path: "{{ agent_gemini_cli_home_dir_test }}/settings.json"
      register: agent_gemini_cli_settings_stat

    - name: 检查 .env 已生成
      stat:
        path: "{{ agent_gemini_cli_home_dir_test }}/.env"
      register: agent_gemini_cli_env_stat

    - name: 检查 GEMINI.md 已同步
      stat:
        path: "{{ agent_gemini_cli_gemini_md_test }}"
      register: agent_gemini_cli_gemini_md_stat

    - name: 断言 Gemini CLI 关键产物存在
      assert:
        that:
          - agent_gemini_cli_settings_stat.stat.exists
          - agent_gemini_cli_settings_stat.stat.isreg
          - agent_gemini_cli_env_stat.stat.exists
          - agent_gemini_cli_env_stat.stat.isreg
          - agent_gemini_cli_gemini_md_stat.stat.exists
          - agent_gemini_cli_gemini_md_stat.stat.isreg
        fail_msg: "agent_gemini_cli 尚未生成完整产物"
        success_msg: "✓ agent_gemini_cli 已生成关键产物"
