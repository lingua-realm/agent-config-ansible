---
- name: Verify — GitHub Copilot CLI MCP 配置幂等
  hosts: all
  environment:
    PATH: "{{ agent_copilot_cli_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_copilot_cli_test_root: /tmp/agent-copilot-cli/default
    agent_copilot_cli_fake_bin: "{{ agent_copilot_cli_test_root }}/fake-bin"
    agent_copilot_cli_home_dir_test: "{{ agent_copilot_cli_test_root }}/home/.copilot"
  tasks:
    - name: 再次执行 agent_copilot_cli 角色
      include_role:
        name: agent_copilot_cli
      vars:
        agent_copilot_cli_home_dir: "{{ agent_copilot_cli_home_dir_test }}"
        agent_copilot_cli_temp_root: "{{ agent_copilot_cli_test_root }}/tmp"
        agent_copilot_cli_mcp_config:
          mcpServers:
            legacy:
              tools:
                - legacy_tool
                - extra_tool
            context7:
              type: stdio
              command: npx
              args:
                - -y
                - '@upstash/context7-mcp'
              env: {}
              tools:
                - "*"
            deepwiki:
              type: http
              url: https://mcp.deepwiki.com/mcp
              headers: {}
              tools:
                - read_page
            playwright:
              type: stdio
              command: npx
              args:
                - '@playwright/mcp@latest'
              env: {}
              cwd: /workspace
              tools:
                - "*"

    - name: 解析最终 mcp-config.json
      command:
        argv:
          - python3
          - -c
          - import json, pathlib, sys; print(json.dumps(json.loads(pathlib.Path(sys.argv[1]).read_text(encoding='utf-8')), ensure_ascii=False))
          - "{{ agent_copilot_cli_home_dir_test }}/mcp-config.json"
      register: agent_copilot_cli_mcp_config_final
      changed_when: false

    - name: 断言第二次执行保持幂等
      assert:
        that:
          - not (agent_copilot_cli_result.changed | bool)
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.legacy.command == 'python3'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.legacy.tools == ['legacy_tool', 'extra_tool']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.context7.type == 'stdio'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.context7.args == ['-y', '@upstash/context7-mcp']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.context7.tools == ['*']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.deepwiki.url == 'https://mcp.deepwiki.com/mcp'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.deepwiki.tools == ['read_page']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.playwright.cwd == '/workspace'
        fail_msg: "agent_copilot_cli 场景验证失败"
        success_msg: "✓ agent_copilot_cli 场景通过"