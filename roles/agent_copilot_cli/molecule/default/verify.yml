---
- name: Verify — GitHub Copilot CLI MCP 配置幂等
  hosts: all
  environment:
    PATH: "{{ agent_copilot_cli_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_copilot_cli_test_root: /tmp/agent-copilot-cli/default
    agent_copilot_cli_fake_bin: "{{ agent_copilot_cli_test_root }}/fake-bin"
    agent_copilot_cli_home_dir_test: "{{ agent_copilot_cli_test_root }}/home/.copilot"
  tasks:
    - name: 再次执行 agent_copilot_cli 角色
      include_role:
        name: agent_copilot_cli
      vars:
        agent_copilot_cli_home_dir: "{{ agent_copilot_cli_home_dir_test }}"
        agent_copilot_cli_temp_root: "{{ agent_copilot_cli_test_root }}/tmp"
        agent_copilot_cli_mcp_config:
          mcpServers:
            legacy:
              type: stdio
              command: python3
              args:
                - -m
                - legacy
              tools:
                - legacy_tool
                - extra_tool
            mcp-server-fetch:
              type: stdio
              command: uvx
              args:
                - mcp-server-fetch
              env: {}
              tools:
                - "*"
            open-websearch:
              type: stdio
              command: npx
              args:
                - -y
                - open-websearch@latest
              env:
                MODE: stdio
                DEFAULT_SEARCH_ENGINE: duckduckgo
                ALLOWED_SEARCH_ENGINES: duckduckgo,bing,brave
              tools:
                - search
            codecov:
              type: stdio
              command: npx
              args:
                - -y
                - '@egulatee/mcp-codecov'
              env:
                CODECOV_BASE_URL: https://codecov.io
              tools:
                - "*"
            serena:
              type: stdio
              command: uvx
              args:
                - --from
                - git+https://github.com/oraios/serena
                - serena
                - start-mcp-server
              tools:
                - "*"
              env: {}
              startup_timeout_sec: 20

    - name: 解析最终 mcp-config.json
      command:
        argv:
          - python3
          - -c
          - import json, pathlib, sys; print(json.dumps(json.loads(pathlib.Path(sys.argv[1]).read_text(encoding='utf-8')), ensure_ascii=False))
          - "{{ agent_copilot_cli_home_dir_test }}/mcp-config.json"
      register: agent_copilot_cli_mcp_config_final
      changed_when: false

    - name: 断言第二次执行保持幂等
      assert:
        that:
          - not (agent_copilot_cli_result.changed | bool)
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.legacy.command == 'python3'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.legacy.tools == ['legacy_tool', 'extra_tool']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers['mcp-server-fetch'].command == 'uvx'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers['mcp-server-fetch'].tools == ['*']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers['open-websearch'].env.MODE == 'stdio'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers['open-websearch'].tools == ['search']
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.codecov.env.CODECOV_BASE_URL == 'https://codecov.io'
          - (agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers.serena.startup_timeout_sec == 20
          - (((agent_copilot_cli_mcp_config_final.stdout | from_json).mcpServers | dict2items | map(attribute='key') | list | sort) == ['codecov', 'legacy', 'mcp-server-fetch', 'open-websearch', 'serena'])
        fail_msg: "agent_copilot_cli 场景验证失败"
        success_msg: "✓ agent_copilot_cli 场景通过"
