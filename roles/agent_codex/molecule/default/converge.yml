---
- name: Converge — Codex CLI 自动化配置
  hosts: all
  environment:
    PATH: "{{ agent_codex_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_codex_test_root: /tmp/agent-codex/default
    agent_codex_fake_bin: "{{ agent_codex_test_root }}/fake-bin"
    agent_codex_home_dir_test: "{{ agent_codex_test_root }}/home/.codex"
  tasks:
    - name: 准备测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ agent_codex_test_root }}"
        - "{{ agent_codex_fake_bin }}"
        - "{{ agent_codex_test_root }}/home"
        - "{{ agent_codex_home_dir_test }}"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 codex 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/codex"
        dest: "{{ agent_codex_fake_bin }}/codex"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 config.toml
      copy:
        dest: "{{ agent_codex_home_dir_test }}/config.toml"
        content: |
          model = "legacy-model"
          model_provider = "legacy"

          [projects."/tmp/agent-codex/default/workspace"]
          trust_level = "trusted"
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 .env
      copy:
        dest: "{{ agent_codex_home_dir_test }}/.env"
        content: |
          LEGACY_TOKEN="legacy"
        mode: "0600"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 AGENTS.md
      copy:
        dest: "{{ agent_codex_home_dir_test }}/AGENTS.md"
        content: legacy
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 执行 agent_codex 角色
      include_role:
        name: agent_codex
      vars:
        agent_codex_home_dir: "{{ agent_codex_home_dir_test }}"
        agent_codex_temp_root: "{{ agent_codex_test_root }}/tmp"
        agent_codex_config:
          model_provider: ppio
          model: pa/gpt-5.4
          model_reasoning_effort: xhigh
          disable_response_storage: true
          preferred_auth_method: apikey
          sandbox_mode: read-only
          history:
            persistence: save-all
          model_providers:
            ppio:
              name: PPIO (GPT-5.4)
              base_url: https://api.ppio.com/openai/v1
              wire_api: responses
              env_key: PPIO_API_KEY
          mcp_servers:
            context7:
              command: npx
              args:
                - -y
                - '@upstash/context7-mcp'
            fetch:
              command: uvx
              args:
                - mcp-server-fetch
            deepwiki:
              url: https://mcp.deepwiki.com/mcp
        agent_codex_env:
          PPIO_API_KEY: test-key
        agent_codex_agents_md_src: "{{ playbook_dir }}/files/AGENTS.md"
