---
- name: Verify — Codex CLI 自动化配置幂等
  hosts: all
  environment:
    PATH: "{{ agent_codex_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_codex_test_root: /tmp/agent-codex/default
    agent_codex_fake_bin: "{{ agent_codex_test_root }}/fake-bin"
    agent_codex_home_dir_test: "{{ agent_codex_test_root }}/home/.codex"
  tasks:
    - name: 再次执行 agent_codex 角色
      include_role:
        name: agent_codex
      vars:
        agent_codex_home_dir: "{{ agent_codex_home_dir_test }}"
        agent_codex_temp_root: "{{ agent_codex_test_root }}/tmp"
        agent_codex_config:
          model_provider: ppio
          model: pa/gpt-5.4
          model_reasoning_effort: xhigh
          disable_response_storage: true
          preferred_auth_method: apikey
          sandbox_mode: read-only
          history:
            persistence: save-all
          model_providers:
            ppio:
              name: PPIO (GPT-5.4)
              base_url: https://api.ppio.com/openai/v1
              wire_api: responses
              env_key: PPIO_API_KEY
          mcp_servers:
            context7:
              command: npx
              args:
                - -y
                - '@upstash/context7-mcp'
            fetch:
              command: uvx
              args:
                - mcp-server-fetch
            deepwiki:
              url: https://mcp.deepwiki.com/mcp
        agent_codex_env:
          PPIO_API_KEY: test-key
        agent_codex_agents_md_src: "{{ playbook_dir }}/files/AGENTS.md"

    - name: 解析最终 config.toml
      command:
        argv:
          - python3
          - -c
          - import json, pathlib, sys, tomllib; print(json.dumps(tomllib.loads(pathlib.Path(sys.argv[1]).read_text(encoding='utf-8')), ensure_ascii=False))
          - "{{ agent_codex_home_dir_test }}/config.toml"
      register: agent_codex_config_final
      changed_when: false

    - name: 读取最终 config.toml 文本
      slurp:
        src: "{{ agent_codex_home_dir_test }}/config.toml"
      register: agent_codex_config_text_final

    - name: 读取最终 .env
      slurp:
        src: "{{ agent_codex_home_dir_test }}/.env"
      register: agent_codex_env_final

    - name: 检查 AGENTS.md 已同步
      stat:
        path: "{{ agent_codex_home_dir_test }}/AGENTS.md"
      register: agent_codex_agents_md_final

    - name: 断言第二次执行保持幂等
      assert:
        that:
          - not (agent_codex_result.changed | bool)
          - (agent_codex_config_final.stdout | from_json).model == 'pa/gpt-5.4'
          - (agent_codex_config_final.stdout | from_json).model_provider == 'ppio'
          - (agent_codex_config_final.stdout | from_json).sandbox_mode == 'read-only'
          - (agent_codex_config_final.stdout | from_json).history.persistence == 'save-all'
          - (agent_codex_config_final.stdout | from_json).model_providers.ppio.env_key == 'PPIO_API_KEY'
          - (agent_codex_config_final.stdout | from_json).mcp_servers.context7.command == 'npx'
          - (agent_codex_config_final.stdout | from_json).mcp_servers.fetch.args == ['mcp-server-fetch']
          - (agent_codex_config_final.stdout | from_json).mcp_servers.deepwiki.url == 'https://mcp.deepwiki.com/mcp'
          - >-
            ((agent_codex_config_final.stdout | from_json).get('projects', {})).get('/tmp/agent-codex/default/workspace', {}).get('trust_level')
            == 'trusted'
          - (agent_codex_config_final.stdout | from_json).profile is not defined
          - >-
            'profile = ""' not in (agent_codex_config_text_final.content | b64decode)
          - >-
            '[projects."/tmp/agent-codex/default/workspace"]'
            in (agent_codex_config_text_final.content | b64decode)
          - >-
            'PPIO_API_KEY="test-key"' in (agent_codex_env_final.content | b64decode)
          - agent_codex_agents_md_final.stat.exists
        fail_msg: "agent_codex 场景验证失败"
        success_msg: "✓ agent_codex 场景通过"

    - name: 准备无法解析旧配置的测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/agent-codex/parse-failure
        - /tmp/agent-codex/parse-failure/home
        - /tmp/agent-codex/parse-failure/home/.codex

    - name: 准备无法解析的旧 config.toml
      copy:
        dest: /tmp/agent-codex/parse-failure/home/.codex/config.toml
        content: |
          model = "legacy-model"
          [projects."/tmp/agent-codex/parse-failure/workspace"
          trust_level = "trusted"
        mode: "0644"

    - name: 读取无法解析的旧 config.toml
      slurp:
        src: /tmp/agent-codex/parse-failure/home/.codex/config.toml
      register: agent_codex_invalid_config_before

    - name: 执行无法解析旧配置的保护检查
      block:
        - name: 对无法解析的旧 config.toml 执行 agent_codex 角色
          include_role:
            name: agent_codex
          vars:
            agent_codex_home_dir: /tmp/agent-codex/parse-failure/home/.codex
            agent_codex_config_path: /tmp/agent-codex/parse-failure/home/.codex/config.toml
            agent_codex_env_path: /tmp/agent-codex/parse-failure/home/.codex/.env
            agent_codex_agents_md_path: /tmp/agent-codex/parse-failure/home/.codex/AGENTS.md
            agent_codex_temp_root: /tmp/agent-codex/parse-failure/tmp
            agent_codex_require_codex_cli: false
            agent_codex_manage_env: false
            agent_codex_manage_agents_md: false
            agent_codex_run_verify: false
            agent_codex_confirm_config_update: false
            agent_codex_backup: false
            agent_codex_config:
              model_provider: ppio
              model: pa/gpt-5.4
              sandbox_mode: read-only
        - name: 标记无法解析旧配置未触发保护失败
          set_fact:
            agent_codex_invalid_config_protected: false
      rescue:
        - name: 记录无法解析旧配置的保护失败结果
          set_fact:
            agent_codex_invalid_config_protected: true
            agent_codex_invalid_config_failure: "{{ ansible_failed_result }}"

    - name: 读取失败后的旧 config.toml
      slurp:
        src: /tmp/agent-codex/parse-failure/home/.codex/config.toml
      register: agent_codex_invalid_config_after

    - name: 断言无法解析的旧 config.toml 不会被覆盖
      assert:
        that:
          - agent_codex_invalid_config_protected | bool
          - >-
            '已停止本次 config.toml 托管以避免覆盖本地 projects 信任状态'
            in (agent_codex_invalid_config_failure.msg | default(''))
          - agent_codex_invalid_config_after.content == agent_codex_invalid_config_before.content
        fail_msg: "agent_codex 未正确保护无法解析的旧 config.toml"
        success_msg: "✓ 无法解析的旧 config.toml 会阻止覆盖"
