---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 2：同步 config.toml
      ========================================

- name: 通过 managed_file 管理 config.toml
  include_role:
    name: managed_file
  vars:
    managed_file_display_name: config.toml
    managed_file_dest: "{{ agent_codex_config_path }}"
    managed_file_temp_path: "{{ agent_codex_temp_root }}/config.toml.rendered"
    managed_file_template_src: "{{ agent_codex_role_path }}/templates/config.toml.j2"
    managed_file_mode: "0644"
    managed_file_compare_kind: plain
    managed_file_confirm: "{{ agent_codex_confirm_config_update }}"
    managed_file_backup: "{{ agent_codex_backup }}"
    managed_file_backup_dir: "{{ agent_codex_config_backup_dir }}"
    managed_file_backup_prefix: "{{ agent_codex_config_backup_prefix }}"

- name: 记录 config.toml 同步结果
  set_fact:
    agent_codex_config_result: "{{ managed_file_result }}"
  changed_when: false