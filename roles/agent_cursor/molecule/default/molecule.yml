---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance-agent-cursor-default
    image: "python:3.13-bookworm"
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: /home/runner/work/agent-config-ansible/agent-config-ansible/roles
      remote_tmp: /tmp/.ansible/tmp
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
