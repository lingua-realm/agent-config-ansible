---
- name: Converge — Cursor MCP 自动化配置
  hosts: all
  environment:
    PATH: "{{ agent_cursor_fake_bin }}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  vars:
    agent_cursor_test_root: /tmp/agent-cursor/default
    agent_cursor_fake_bin: "{{ agent_cursor_test_root }}/fake-bin"
    agent_cursor_home_dir_test: "{{ agent_cursor_test_root }}/home/.cursor"
  tasks:
    - name: 准备测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ agent_cursor_test_root }}"
        - "{{ agent_cursor_fake_bin }}"
        - "{{ agent_cursor_test_root }}/home"
        - "{{ agent_cursor_home_dir_test }}"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 agent 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/agent"
        dest: "{{ agent_cursor_fake_bin }}/agent"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 mcp.json
      copy:
        dest: "{{ agent_cursor_home_dir_test }}/mcp.json"
        content: |
          {
            "mcpServers": {
              "legacy": {
                "command": "python3",
                "args": ["-m", "legacy"]
              }
            }
          }
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 执行 agent_cursor 角色
      include_role:
        name: agent_cursor
      vars:
        agent_cursor_home_dir: "{{ agent_cursor_home_dir_test }}"
        agent_cursor_temp_root: "{{ agent_cursor_test_root }}/tmp"
        agent_cursor_mcp_config:
          mcpServers:
            legacy:
              env:
                MODE: stdio
            context7:
              command: npx
              args:
                - -y
                - '@upstash/context7-mcp'
              env: {}
              autoApprove:
                - resolve-library-id
            deepwiki:
              url: https://mcp.deepwiki.com/mcp
              headers: {}
              disabled: false
            playwright:
              command: npx
              args:
                - '@playwright/mcp@latest'
              env: {}
              cwd: /workspace
