---
- name: Converge — Claude Code 自动化配置
  hosts: all
  environment:
    PATH: "{{ agent_claude_code_fake_bin }}:{{ ansible_env.PATH }}"
    FAKE_CLAUDE_STATE_DIR: "{{ agent_claude_code_test_root }}/state"
  vars:
    agent_claude_code_test_root: /tmp/agent-claude-code/default
    agent_claude_code_fake_bin: "{{ agent_claude_code_test_root }}/fake-bin"
    agent_claude_code_home_dir_test: "{{ agent_claude_code_test_root }}/home/.claude"
    agent_claude_code_user_json_path_test: "{{ agent_claude_code_test_root }}/home/.claude.json"
  tasks:
    - name: 准备测试目录
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ agent_claude_code_test_root }}"
        - "{{ agent_claude_code_fake_bin }}"
        - "{{ agent_claude_code_test_root }}/state"
        - "{{ agent_claude_code_test_root }}/home"
        - "{{ agent_claude_code_home_dir_test }}/output-styles"
        - "{{ agent_claude_code_home_dir_test }}/skills/legacy-skill"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 claude 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/claude"
        dest: "{{ agent_claude_code_fake_bin }}/claude"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 安装假 ccline 可执行文件
      copy:
        src: "{{ playbook_dir }}/files/fake-bin/ccline"
        dest: "{{ agent_claude_code_fake_bin }}/ccline"
        mode: "0755"
      tags:
        - molecule-idempotence-notest

    - name: 预置旧的 ~/.claude.json
      copy:
        dest: "{{ agent_claude_code_user_json_path_test }}"
        content: |
          {
            "untouched": true,
            "mcpServers": {
              "mcp-server-fetch": {
                "command": "uvx",
                "args": ["mcp-server-fetch"],
                "env": {}
              },
              "existing": {
                "command": "python3",
                "args": ["existing.py"]
              }
            }
          }
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 预置陈旧 output-style 文件
      copy:
        dest: "{{ agent_claude_code_home_dir_test }}/output-styles/legacy.md"
        content: legacy
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 预置陈旧 skill 文件
      copy:
        dest: "{{ agent_claude_code_home_dir_test }}/skills/legacy-skill/SKILL.md"
        content: legacy
        mode: "0644"
      tags:
        - molecule-idempotence-notest

    - name: 执行 agent_claude_code 角色
      include_role:
        name: agent_claude_code
      vars:
        agent_claude_code_home_dir: "{{ agent_claude_code_home_dir_test }}"
        agent_claude_code_user_json_path: "{{ agent_claude_code_user_json_path_test }}"
        agent_claude_code_temp_root: "{{ agent_claude_code_test_root }}/tmp"
        agent_claude_code_settings:
          env:
            ANTHROPIC_API_KEY: test-key
            ANTHROPIC_BASE_URL: https://example.test
          model: claude-sonnet-4-5
          alwaysThinkingEnabled: true
          outputStyle: custom-style
          language: zh-CN
          permissions:
            defaultMode: default
            allow:
              - Read(*)
              - Edit(*)
            deny: []
          cleanupPeriodDays: 14
          hooks: {}
          enabledPlugins:
            - test-plugin@claude-plugins-official
          statusLine:
            type: command
            command: ccline
            padding: 0
        agent_claude_code_user_json:
          hasCompletedOnboarding: true
          mcpServers:
            mcp-server-fetch:
              command: uvx
              args:
                - mcp-server-fetch
            local-demo:
              command: node
              args:
                - server.js
        agent_claude_code_output_styles_src: "{{ playbook_dir }}/files/output-styles"
        agent_claude_code_claude_md_src: "{{ playbook_dir }}/files/CLAUDE.md"
        agent_claude_code_verify_schema: true
        agent_claude_code_settings_schemafile: "{{ playbook_dir }}/files/settings.schema.json"
