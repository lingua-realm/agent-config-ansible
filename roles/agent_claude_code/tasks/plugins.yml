---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 2：管理 Claude 插件
      ========================================
      目标插件数量：{{ agent_claude_code_effective_plugins_to_install | length }}

- name: 提示无需安装插件
  debug:
    msg: "未配置任何插件，跳过插件管理"
  when: agent_claude_code_effective_plugins_to_install | length == 0

- name: 提取目标插件使用的 marketplace 列表
  set_fact:
    agent_claude_code_required_marketplaces: >-
      {{
        agent_claude_code_effective_plugins_to_install
        | select('search', '@')
        | map('regex_replace', '^.*@', '')
        | unique
        | list
      }}
  changed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 获取已配置 marketplace 列表
  command:
    argv:
      - claude
      - plugin
      - marketplace
      - list
      - --json
  register: agent_claude_code_marketplaces_raw
  changed_when: false
  failed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 解析已配置 marketplace 列表
  set_fact:
    agent_claude_code_configured_marketplaces: >-
      {{
        (
          agent_claude_code_marketplaces_raw.stdout
          if agent_claude_code_marketplaces_raw.rc == 0
          and (agent_claude_code_marketplaces_raw.stdout | trim | length > 0)
          else '[]'
        ) | from_json
      }}
    agent_claude_code_configured_marketplace_names: >-
      {{
        (
          (
            agent_claude_code_marketplaces_raw.stdout
            if agent_claude_code_marketplaces_raw.rc == 0
            and (agent_claude_code_marketplaces_raw.stdout | trim | length > 0)
            else '[]'
          ) | from_json
        ) | map(attribute='name') | list
      }}
  changed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 计算待补充的 marketplace 列表
  set_fact:
    agent_claude_code_marketplaces_to_add: >-
      {{
        agent_claude_code_required_marketplaces
        | difference(agent_claude_code_configured_marketplace_names)
      }}
    agent_claude_code_unknown_marketplaces: >-
      {{
        agent_claude_code_required_marketplaces
        | difference(
            agent_claude_code_configured_marketplace_names
            + (agent_claude_code_plugin_marketplaces.keys() | list)
          )
      }}
  changed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 校验 marketplace 映射完整性
  assert:
    that:
      - agent_claude_code_unknown_marketplaces | length == 0
    fail_msg: >-
      以下插件 marketplace 未配置 URL 且当前本机也尚未存在：{{ agent_claude_code_unknown_marketplaces | join(', ') }}
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 添加缺失的 marketplace
  command:
    argv:
      - claude
      - plugin
      - marketplace
      - add
      - "{{ agent_claude_code_plugin_marketplaces[item] }}"
  loop: "{{ agent_claude_code_marketplaces_to_add }}"
  loop_control:
    label: "{{ item }}"
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 更新所需 marketplace 索引
  command:
    argv:
      - claude
      - plugin
      - marketplace
      - update
      - "{{ item }}"
  loop: "{{ agent_claude_code_required_marketplaces }}"
  loop_control:
    label: "{{ item }}"
  register: agent_claude_code_marketplace_update_result
  changed_when: false
  failed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 获取已安装插件列表
  command:
    argv:
      - claude
      - plugin
      - list
      - --json
  register: agent_claude_code_installed_plugins_raw
  changed_when: false
  failed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 解析已安装插件列表
  set_fact:
    agent_claude_code_installed_plugin_ids: >-
      {{
        (
          (
            agent_claude_code_installed_plugins_raw.stdout
            if agent_claude_code_installed_plugins_raw.rc == 0
            and (agent_claude_code_installed_plugins_raw.stdout | trim | length > 0)
            else '[]'
          ) | from_json
        ) | map(attribute='id') | list
      }}
  changed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 计算需要安装的插件
  set_fact:
    agent_claude_code_plugins_to_add: >-
      {{
        agent_claude_code_effective_plugins_to_install
        | difference(agent_claude_code_installed_plugin_ids)
      }}
  changed_when: false
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 显示插件安装计划
  debug:
    msg: |
      已安装：{{ agent_claude_code_installed_plugin_ids | default([]) }}
      待安装：{{ agent_claude_code_plugins_to_add | default([]) }}
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 提示无需安装插件
  debug:
    msg: "所有目标插件已安装，跳过安装"
  when:
    - agent_claude_code_effective_plugins_to_install | length > 0
    - agent_claude_code_plugins_to_add | length == 0

- name: 安装缺失插件
  command:
    argv:
      - claude
      - plugin
      - install
      - "{{ item }}"
  loop: "{{ agent_claude_code_plugins_to_add }}"
  loop_control:
    label: "{{ item }}"
  when:
    - agent_claude_code_effective_plugins_to_install | length > 0
    - agent_claude_code_plugins_to_add | length > 0

- name: 获取安装后的插件列表
  command:
    argv:
      - claude
      - plugin
      - list
      - --json
  register: agent_claude_code_installed_plugins_after_raw
  changed_when: false
  when:
    - agent_claude_code_effective_plugins_to_install | length > 0
    - agent_claude_code_plugins_to_add | length > 0

- name: 解析安装后的插件列表
  set_fact:
    agent_claude_code_installed_plugin_ids_final: >-
      {{
        (
          (
            agent_claude_code_installed_plugins_after_raw.stdout
            if (agent_claude_code_installed_plugins_after_raw.stdout | trim | length > 0)
            else '[]'
          ) | from_json
        ) | map(attribute='id') | list
      }}
  changed_when: false
  when:
    - agent_claude_code_effective_plugins_to_install | length > 0
    - agent_claude_code_plugins_to_add | length > 0

- name: 校验插件安装结果
  assert:
    that:
      - item in (agent_claude_code_installed_plugin_ids_final | default(agent_claude_code_installed_plugin_ids))
    fail_msg: "插件 {{ item }} 安装失败"
    success_msg: "插件 {{ item }} 安装成功"
  loop: "{{ agent_claude_code_effective_plugins_to_install }}"
  loop_control:
    label: "{{ item }}"
  when: agent_claude_code_effective_plugins_to_install | length > 0

- name: 汇总插件阶段结果
  set_fact:
    agent_claude_code_plugins_result:
      changed: >-
        {{
          (agent_claude_code_marketplaces_to_add | default([]) | length > 0)
          or (agent_claude_code_plugins_to_add | default([]) | length > 0)
        }}
      requested: "{{ agent_claude_code_effective_plugins_to_install }}"
      installed: >-
        {{
          agent_claude_code_installed_plugin_ids_final
          | default(agent_claude_code_installed_plugin_ids | default([]))
        }}
  changed_when: false