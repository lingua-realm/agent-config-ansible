---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 1：校验 Claude Code 配置输入
      ========================================

- name: 校验 Claude Code 角色输入
  assert:
    that:
      - agent_claude_code_home_dir | length > 0
      - agent_claude_code_user_json_path | length > 0
      - agent_claude_code_temp_root | length > 0
      - agent_claude_code_settings is mapping
      - agent_claude_code_user_json is mapping
      - agent_claude_code_plugin_marketplaces is mapping
      - agent_claude_code_plugins_to_install is sequence
      - agent_claude_code_plugins_to_install is not string
    fail_msg: >-
      agent_claude_code 角色参数无效：请至少提供 settings 与 user_json 的对象结构，
      并确保 home_dir / user_json_path / temp_root 非空。

- name: 归一化 Claude Code 设置对象
  set_fact:
    agent_claude_code_settings_normalized: >-
      {{
        {
          'env': {},
          'model': '',
          'alwaysThinkingEnabled': false,
          'effortLevel': '',
          'outputStyle': '',
          'language': '',
          'permissions': {
            'defaultMode': 'default',
            'allow': [],
            'deny': []
          },
          'cleanupPeriodDays': 30,
          'hooks': {},
          'enabledPlugins': [],
          'statusLine': {
            'type': 'command',
            'command': 'ccline',
            'padding': 0
          }
        } | combine(agent_claude_code_settings, recursive=True)
      }}
    agent_claude_code_user_json_normalized: >-
      {{
        {
          'hasCompletedOnboarding': true,
          'mcpServers': {}
        } | combine(agent_claude_code_user_json, recursive=True)
      }}
  changed_when: false

- name: 校验归一化后的 Claude Code 配置
  assert:
    that:
      - agent_claude_code_settings_normalized.env is mapping
      - agent_claude_code_settings_normalized.model | length > 0
      - agent_claude_code_settings_normalized.effortLevel is string
      - agent_claude_code_settings_normalized.outputStyle | length > 0
      - agent_claude_code_settings_normalized.permissions is mapping
      - agent_claude_code_settings_normalized.permissions.allow is sequence
      - agent_claude_code_settings_normalized.permissions.allow is not string
      - agent_claude_code_settings_normalized.permissions.deny is sequence
      - agent_claude_code_settings_normalized.permissions.deny is not string
      - agent_claude_code_settings_normalized.hooks is mapping
      - agent_claude_code_settings_normalized.enabledPlugins is sequence
      - agent_claude_code_settings_normalized.enabledPlugins is not string
      - agent_claude_code_settings_normalized.statusLine is mapping
      - agent_claude_code_user_json_normalized.mcpServers is mapping
    fail_msg: >-
      agent_claude_code 角色参数无效：请至少提供 settings.model、settings.outputStyle，
      并确保 env / permissions / hooks / enabledPlugins / statusLine / user_json 的结构正确。

- name: 归一化 Claude Code 辅助变量
  set_fact:
    agent_claude_code_effective_plugins_to_install: >-
      {{
        (
          agent_claude_code_plugins_to_install
          if (agent_claude_code_plugins_to_install | length > 0)
          else agent_claude_code_settings_normalized.enabledPlugins
        ) | unique | list
      }}
    agent_claude_code_should_manage_ccline: >-
      {{
        agent_claude_code_settings_normalized.statusLine.type | default('') == 'command'
        and agent_claude_code_settings_normalized.statusLine.command | default('') == 'ccline'
      }}
    agent_claude_code_output_styles_src_normalized: >-
      {{
        ((agent_claude_code_output_styles_src | regex_replace('/+$', '')) ~ '/')
        if (agent_claude_code_output_styles_src | length > 0)
        else ''
      }}
    agent_claude_code_plugins_result:
      changed: false
      requested: []
      installed: []
    agent_claude_code_user_json_result:
      changed: false
      path: "{{ agent_claude_code_user_json_path }}"
    agent_claude_code_settings_result:
      changed: false
      path: "{{ agent_claude_code_home_dir }}/settings.json"
    agent_claude_code_output_styles_result:
      changed: false
      path: "{{ agent_claude_code_home_dir }}/output-styles"
    agent_claude_code_claude_md_result:
      changed: false
      path: "{{ agent_claude_code_home_dir }}/CLAUDE.md"
    agent_claude_code_role_path: "{{ role_path }}"
    agent_claude_code_claude_cli_status: {}
    agent_claude_code_ccline_status: {}
  changed_when: false

- name: 确保 Claude Code 临时目录存在
  file:
    path: "{{ agent_claude_code_temp_root }}"
    state: directory
    mode: "0700"

- name: 检查外部 output-styles 目录
  stat:
    path: "{{ agent_claude_code_output_styles_src }}"
  register: agent_claude_code_output_styles_src_stat
  delegate_to: localhost
  become: false
  when: agent_claude_code_output_styles_src | length > 0

- name: 校验外部 output-styles 目录
  assert:
    that:
      - agent_claude_code_output_styles_src_stat.stat.exists
      - agent_claude_code_output_styles_src_stat.stat.isdir
    fail_msg: "外部 output-styles 目录不存在或不是目录：{{ agent_claude_code_output_styles_src }}"
  when: agent_claude_code_output_styles_src | length > 0

- name: 检查外部 CLAUDE.md 文件
  stat:
    path: "{{ agent_claude_code_claude_md_src }}"
  register: agent_claude_code_claude_md_src_stat
  delegate_to: localhost
  become: false
  when: agent_claude_code_claude_md_src | length > 0

- name: 校验外部 CLAUDE.md 文件
  assert:
    that:
      - agent_claude_code_claude_md_src_stat.stat.exists
      - agent_claude_code_claude_md_src_stat.stat.isreg
    fail_msg: "外部 CLAUDE.md 文件不存在或不是普通文件：{{ agent_claude_code_claude_md_src }}"
  when: agent_claude_code_claude_md_src | length > 0

- name: 检查 Claude CLI 是否在 PATH 中
  shell: 'export PATH="$PATH:$HOME/.local/bin"; command -v claude'
  register: _accc_claude_path_check
  changed_when: false
  failed_when: false
  when: agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool

- name: 自动安装 Claude CLI
  shell: "{{ agent_claude_code_claude_install_command }}"
  args:
    executable: /bin/bash
  register: _accc_claude_install
  changed_when: (_accc_claude_install.rc | default(1)) == 0
  failed_when: false
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(0)) != 0
    - agent_claude_code_claude_auto_install | bool

- name: 校验 Claude CLI 自动安装失败
  fail:
    msg: >-
      Claude CLI 自动安装失败，请检查安装脚本输出或手动安装。
      安装命令：{{ agent_claude_code_claude_install_command }}
      stdout={{ _accc_claude_install.stdout | default('') }}
      stderr={{ _accc_claude_install.stderr | default('') }}
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(0)) != 0
    - agent_claude_code_claude_auto_install | bool
    - (_accc_claude_install.rc | default(1)) != 0

- name: 重新检查 Claude CLI（自动安装后）
  shell: 'export PATH="$PATH:$HOME/.local/bin"; command -v claude'
  register: _accc_claude_path_after
  changed_when: false
  failed_when: false
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(0)) != 0
    - agent_claude_code_claude_auto_install | bool
    - (_accc_claude_install.rc | default(1)) == 0

- name: 校验 Claude CLI 自动安装后仍不可用
  fail:
    msg: >-
      Claude CLI 自动安装后仍未在 PATH 中检测到，请检查安装脚本输出或手动安装。
      安装命令：{{ agent_claude_code_claude_install_command }}
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(0)) != 0
    - agent_claude_code_claude_auto_install | bool
    - (_accc_claude_install.rc | default(1)) == 0
    - (_accc_claude_path_after.rc | default(1)) != 0

- name: 校验 Claude CLI 不可用（未启用自动安装）
  fail:
    msg: >-
      未检测到可用的 Claude CLI，无法继续执行 Claude Code 配置。
      如需自动安装，请设置 agent_claude_code_claude_auto_install: true。
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(0)) != 0
    - not (agent_claude_code_claude_auto_install | bool)

- name: 获取 Claude CLI 版本
  shell: 'export PATH="$PATH:$HOME/.local/bin"; claude --version'
  register: _accc_claude_version
  changed_when: false
  failed_when: false
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(1)) == 0
      or (_accc_claude_path_after.rc | default(1)) == 0

- name: 暴露 Claude CLI 状态
  set_fact:
    agent_claude_code_claude_cli_status: >-
      {{
        {
          'available': true,
          'path': (
            _accc_claude_path_check.stdout
            if (_accc_claude_path_check.rc | default(1)) == 0
            else (_accc_claude_path_after.stdout | default(''))
          ),
          'version': _accc_claude_version.stdout | default(''),
          'installed_now': (_accc_claude_path_check.rc | default(0)) != 0
        }
      }}
  changed_when: false
  when:
    - agent_claude_code_require_claude_cli | bool or agent_claude_code_manage_plugins | bool
    - (_accc_claude_path_check.rc | default(1)) == 0
      or (_accc_claude_path_after.rc | default(1)) == 0

- name: 检查 ccline
  include_role:
    name: npm_command_bootstrap
  vars:
    npm_command_bootstrap_key: ccline
    npm_command_bootstrap_display_name: ccline
    npm_command_bootstrap_command: ccline
    npm_command_bootstrap_version_command: ccline --version
    npm_command_bootstrap_auto_install_npm: >-
      {{ agent_claude_code_ccline_auto_install_npm if (agent_claude_code_ccline_auto_install_npm | length > 0) else omit }}
    npm_command_bootstrap_required: "{{ agent_claude_code_require_ccline }}"
    npm_command_bootstrap_fail_message: "ccline 不可用，无法满足当前 statusLine 配置。"
    npm_command_bootstrap_install_fail_message: "ccline 自动安装失败，请检查 npm 环境或手动安装。"
  when: agent_claude_code_should_manage_ccline | bool

- name: 暴露 ccline 状态
  set_fact:
    agent_claude_code_ccline_status: "{{ npm_command_bootstrap_results.ccline | default({}) }}"
  changed_when: false
  when:
    - agent_claude_code_should_manage_ccline | bool
    - npm_command_bootstrap_results is defined

- name: 显示 CLI 状态汇总
  debug:
    msg: |
      ----------------------------------------
      Claude CLI：{{ agent_claude_code_claude_cli_status.version | default('未检查') }}
      ccline：{{ agent_claude_code_ccline_status.version | default('未检查') }}
      ----------------------------------------
