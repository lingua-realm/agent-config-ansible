---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 4：同步 settings.json
      ========================================

- name: 通过 managed_file 管理 settings.json
  include_role:
    name: managed_file
  vars:
    managed_file_display_name: settings.json
    managed_file_dest: "{{ agent_claude_code_home_dir }}/settings.json"
    managed_file_temp_path: "{{ agent_claude_code_temp_root }}/settings.json.rendered"
    managed_file_template_src: "{{ agent_claude_code_role_path }}/templates/settings.json.j2"
    managed_file_mode: "0644"
    managed_file_compare_kind: json_sorted
    managed_file_confirm: "{{ agent_claude_code_confirm_settings_update }}"
    managed_file_backup: "{{ agent_claude_code_backup }}"

- name: 记录 settings.json 同步结果
  set_fact:
    agent_claude_code_settings_result: "{{ managed_file_result }}"
  changed_when: false