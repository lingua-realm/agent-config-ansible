---
- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 3：验证 OpenCommit CLI 配置结果
      ========================================

- name: 检查 ~/.opencommit 是否存在
  stat:
    path: "{{ opencommit_cli_config_path }}"
  register: opencommit_cli_config_stat
  when: opencommit_cli_manage_config | bool

- name: 解析 ~/.opencommit
  command:
    argv:
      - "{{ ansible_python_interpreter | default('/usr/bin/python3') }}"
      - -c
      - |
        import json, pathlib, sys
        data = {}
        for raw_line in pathlib.Path(sys.argv[1]).read_text(encoding='utf-8').splitlines():
            line = raw_line.strip()
            if not line or line.startswith('#'):
                continue
            if '=' not in line:
                print(f"invalid config line (must be 'KEY=VALUE'): {raw_line}", file=sys.stderr)
                raise SystemExit(1)
            key, value = line.split('=', 1)
            try:
                data[key] = json.loads(value)
            except json.JSONDecodeError:
                data[key] = value
        print(json.dumps(data, ensure_ascii=False, sort_keys=True))
      - "{{ opencommit_cli_config_path }}"
  register: opencommit_cli_config_parsed
  changed_when: false
  when:
    - opencommit_cli_manage_config | bool
    - opencommit_cli_config_stat.stat.exists
    - opencommit_cli_config_stat.stat.isreg

- name: 断言 OpenCommit CLI 结果
  assert:
    that:
      - >-
        not (opencommit_cli_require_opencommit_cli | bool)
        or (opencommit_cli_opencommit_status.available | default(false) | bool)
      - >-
        not (opencommit_cli_manage_config | bool)
        or (
          (opencommit_cli_config_stat.stat.exists | default(false))
          and (opencommit_cli_config_stat.stat.isreg | default(false))
        )
      - >-
        not (opencommit_cli_manage_config | bool)
        or ((opencommit_cli_config_parsed.stdout | from_json) == opencommit_cli_config_normalized)
    fail_msg: "opencommit_cli 验证失败：CLI 状态或 ~/.opencommit 内容与预期不一致"
    success_msg: "✓ opencommit_cli 验证通过"
