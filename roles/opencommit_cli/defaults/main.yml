---
# OpenCommit 配置所在的用户目录
opencommit_cli_home_dir: "{{ lookup('env', 'HOME') }}"

# OpenCommit 核心配置文件路径
opencommit_cli_config_path: "{{ opencommit_cli_home_dir }}/.opencommit"

# 角色工作临时目录
opencommit_cli_temp_root: /tmp/opencommit-cli

# 是否要求 OpenCommit CLI 可用
opencommit_cli_require_opencommit_cli: true

# OpenCommit CLI 不可用时用于自动安装的 npm 包名；设为空字符串可关闭自动安装
opencommit_cli_opencommit_auto_install_npm: "opencommit"

# 是否管理 ~/.opencommit 以及执行最终验证
opencommit_cli_manage_config: true
opencommit_cli_run_verify: true

# 是否在变更 ~/.opencommit 时交互确认
opencommit_cli_confirm_config_update: true

# 是否为 ~/.opencommit 创建备份
opencommit_cli_backup: true

# 统一备份根目录；为空时回退到目标文件目录下的 .managed_file_backups
opencommit_cli_backup_root: ""

# ~/.opencommit 备份目录与前缀
opencommit_cli_config_backup_dir: >-
  {{
    ((opencommit_cli_backup_root | regex_replace('/+$', '')) ~ '/config')
    if (opencommit_cli_backup_root | length > 0)
    else (((opencommit_cli_config_path | dirname) | regex_replace('/+$', '')) ~ '/.managed_file_backups')
  }}
opencommit_cli_config_backup_prefix: .opencommit

# 生成 ~/.opencommit 的配置对象
opencommit_cli_config: {}
